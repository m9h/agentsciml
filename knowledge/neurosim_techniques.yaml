# Neurosim (bl1) cortical culture simulation technique knowledge base
# Curated from computational neuroscience literature on STDP,
# network dynamics, and DishBrain-inspired in-silico experiments.
# Categories: stdp, topology, stimulation, pharmacology, simulation, analysis

- name: "Asymmetric STDP with narrow timing window"
  category: stdp
  description: >
    Classical Hebbian STDP with tau_plus < tau_minus and a narrow
    potentiation window (tau_plus ~10ms). Tight timing windows enforce
    precise spike-timing correlations, producing selective strengthening
    of causal connections. Can accelerate learning of temporal patterns
    but risks losing broader correlational structure.
  applicable_when: "Culture fails to learn temporal sequence tasks; connections are too diffuse"
  code_pattern: |
    stdp = configure_stdp(
        rule='pair',
        tau_plus=10.0, tau_minus=20.0,
        a_plus=0.01, a_minus=0.012,  # slight LTD dominance for stability
    )
  tags: [stdp, timing, hebbian]

- name: "Triplet STDP rule"
  category: stdp
  description: >
    Extension of pair-based STDP that considers triplets of spikes
    (pre-post-pre or post-pre-post). Captures frequency dependence
    of plasticity that pair-based rules miss. Better reproduces
    experimental BCM-like behavior and rate-dependent effects.
    Pfister & Gerstner (2006).
  applicable_when: "Pair STDP produces unstable dynamics or fails to capture rate-dependent learning"
  code_pattern: |
    stdp = configure_stdp(
        rule='triplet',
        tau_plus=16.8, tau_minus=33.7,
        a_plus=0.005, a_minus=0.007,
        tau_x=101.0, tau_y=125.0,  # slow triplet time constants
    )
  tags: [stdp, triplet, frequency-dependence]

- name: "Reward-modulated STDP"
  category: stdp
  description: >
    STDP traces are maintained but only consolidated into weight changes
    when a reward signal arrives. Implements a three-factor learning rule
    (pre, post, reward) that enables goal-directed learning. Critical for
    game tasks where the culture must learn from delayed feedback.
    Izhikevich (2007).
  applicable_when: "Culture needs to learn from reward signals; unsupervised STDP alone doesn't solve the task"
  code_pattern: |
    stdp = configure_stdp(
        rule='reward_modulated',
        tau_plus=20.0, tau_minus=40.0,
        a_plus=0.008, a_minus=0.005,
        tau_eligibility=1000.0,  # eligibility trace decay (ms)
        reward_magnitude=1.0,
    )
  tags: [stdp, reward, three-factor]

- name: "Voltage-dependent STDP"
  category: stdp
  description: >
    Plasticity depends on postsynaptic membrane voltage rather than just
    spike timing. Produces LTP when postsynaptic neuron is depolarized
    and LTD when hyperpolarized, matching experimental data from
    Clopath et al. (2010). More biologically realistic than pair STDP.
  applicable_when: "Need plasticity rule that accounts for subthreshold dynamics; pair STDP is too coarse"
  code_pattern: |
    stdp = configure_stdp(
        rule='voltage_dependent',
        tau_plus=10.0, tau_minus=7.0,
        a_plus=0.005, a_minus=0.001,
        theta_low=-70.6,   # mV, LTD threshold
        theta_high=-45.3,  # mV, LTP threshold
    )
  tags: [stdp, voltage, clopath]

- name: "Small-world network topology"
  category: topology
  description: >
    Watts-Strogatz small-world networks combine high local clustering
    with short path lengths. Mimics cortical microcircuit connectivity
    where nearby neurons are densely connected with sparse long-range
    connections. Supports both local processing and global information
    integration.
  applicable_when: "Random networks lack structure; need balance of local and global connectivity"
  code_pattern: |
    network = create_network(
        n_neurons=10000,
        topology='small_world',
        connectivity=0.1,
        rewiring_prob=0.1,  # fraction of edges rewired
        seed=42,
    )
  tags: [topology, small-world, connectivity]

- name: "Distance-dependent connectivity"
  category: topology
  description: >
    Connection probability decays with distance between neurons on the
    virtual MEA. Produces realistic spatial structure where nearby neurons
    form dense clusters and distant connections are sparse. Most
    biologically accurate topology option.
  applicable_when: "Want spatially realistic connectivity; spatial patterns in MEA data matter"
  code_pattern: |
    network = create_network(
        n_neurons=10000,
        topology='distance_dependent',
        connectivity=0.15,
        decay_constant=200.0,  # um, spatial decay of connection probability
        seed=42,
    )
  tags: [topology, spatial, realistic]

- name: "Cortical column motif"
  category: topology
  description: >
    Organize neurons into columnar groups mimicking cortical
    microcolumns. Each column has excitatory and inhibitory populations
    with layer-specific connectivity. Columns are densely connected
    internally with sparse inter-column connections.
  applicable_when: "Want hierarchical organization; simple flat networks underperform on structured tasks"
  code_pattern: |
    network = create_network(
        n_neurons=10000,
        topology='cortical_column',
        connectivity=0.2,
        n_columns=20,
        ei_ratio=0.8,  # 80% excitatory
        seed=42,
    )
  tags: [topology, column, hierarchical]

- name: "Closed-loop activity-dependent stimulation"
  category: stimulation
  description: >
    Monitor network activity in real-time and adjust stimulation based on
    firing patterns. Stimulate when activity drops below threshold (prevent
    quiescence) or reduce stimulation during bursts (prevent seizure-like
    activity). Maintains the network in a critical regime optimal for
    information processing.
  applicable_when: "Network oscillates between quiescence and bursting; need homeostatic regulation"
  code_pattern: |
    stim = configure_stimulation(
        protocol='activity_dependent',
        electrodes='all',
        target_rate=5.0,       # Hz, target mean firing rate
        gain=0.5,              # stimulation gain
        update_interval=100.0, # ms, how often to adjust
    )
  tags: [stimulation, closed-loop, homeostatic]

- name: "Reward-modulated stimulation protocol"
  category: stimulation
  description: >
    Deliver stimulation contingent on task performance. Correct responses
    trigger one stimulation pattern, incorrect responses trigger another.
    Implements the DishBrain paradigm where cultures learn to play games
    via differential stimulation feedback. Kagan et al. (2022).
  applicable_when: "Culture must learn a game task; need to close the sensorimotor loop"
  code_pattern: |
    stim = configure_stimulation(
        protocol='reward_modulated',
        electrodes='output_region',
        reward_pattern='structured',     # coherent pattern for correct
        punishment_pattern='random',     # random noise for incorrect
        reward_amplitude=200.0,          # uA
        punishment_amplitude=300.0,      # uA
    )
  tags: [stimulation, reward, dishbrain]

- name: "Patterned stimulation for input encoding"
  category: stimulation
  description: >
    Encode sensory input as spatiotemporal patterns across MEA electrodes.
    Different game states map to different electrode activation patterns.
    The encoding scheme determines how easily the culture can discriminate
    inputs — rate coding vs temporal coding vs population coding.
  applicable_when: "Need to encode game state information into stimulation; random stimulation doesn't carry enough information"
  code_pattern: |
    stim = configure_stimulation(
        protocol='patterned',
        electrodes='input_region',
        encoding='rate',          # or 'temporal', 'population'
        n_input_channels=8,
        pattern_duration=50.0,    # ms per input presentation
    )
  tags: [stimulation, encoding, input]

- name: "GABAergic modulation sweep"
  category: pharmacology
  description: >
    Vary the strength of inhibitory (GABAergic) synapses to control
    excitation-inhibition balance. Too little inhibition causes
    seizure-like bursting; too much causes quiescence. The optimal
    E/I ratio is critical for information processing capacity.
  applicable_when: "Network shows pathological dynamics (bursting or silence); need to tune E/I balance"
  code_pattern: |
    # Sweep GABA conductance multiplier
    for gaba_scale in [0.5, 0.75, 1.0, 1.25, 1.5, 2.0]:
        network = create_network(n_neurons=10000, topology='small_world',
                                 connectivity=0.1, gaba_scale=gaba_scale, seed=42)
  tags: [pharmacology, GABA, ei-balance]

- name: "NMDA/AMPA ratio optimization"
  category: pharmacology
  description: >
    Adjust the ratio of NMDA to AMPA receptor conductances. Higher NMDA
    fraction provides slower, voltage-dependent excitation that supports
    temporal integration and working memory-like dynamics. Lower NMDA
    fraction produces faster, more reactive responses.
  applicable_when: "Culture responds too quickly or too slowly to stimulation; need to tune temporal integration"
  code_pattern: |
    # Configure receptor ratios
    network = create_network(
        n_neurons=10000, topology='small_world',
        nmda_ampa_ratio=0.5,  # default ~0.4-0.6
        seed=42,
    )
  tags: [pharmacology, NMDA, AMPA, temporal]

- name: "Firing rate homeostasis via intrinsic plasticity"
  category: simulation
  description: >
    Adapt neuronal excitability (firing thresholds) to maintain target
    firing rates. Neurons that fire too much become less excitable;
    neurons that fire too little become more excitable. Prevents
    runaway excitation and ensures all neurons participate in computation.
  applicable_when: "Firing rate distribution is bimodal (some neurons dominate, others silent)"
  code_pattern: |
    # Intrinsic plasticity parameters
    target_rate = 5.0         # Hz
    ip_learning_rate = 0.001
    ip_update_interval = 1000 # ms
  tags: [simulation, homeostasis, intrinsic-plasticity]

- name: "Scaling neuron count for convergence"
  category: simulation
  description: >
    Run experiments at multiple network sizes to verify that results
    scale. Start with 1K neurons for fast iteration, then validate at
    5K and 10K. Some phenomena only emerge at sufficient scale (e.g.,
    population-level oscillations, pattern completion).
  applicable_when: "Results are inconsistent or network is too small to support the target dynamics"
  code_pattern: |
    for n_neurons in [1000, 5000, 10000]:
        network = create_network(n_neurons=n_neurons, topology='small_world',
                                 connectivity=0.1, seed=42)
        result, t = run_culture(network, stdp, stim, game_task='pong',
                                max_episodes=500, seed=42)
  tags: [simulation, scaling, convergence]

- name: "Electrode placement optimization"
  category: simulation
  description: >
    Optimize which MEA electrodes are used for stimulation vs recording.
    Input and output regions should be spatially separated to allow
    information flow through the network. Electrode placement determines
    the effective input-output mapping the culture must learn.
  applicable_when: "Culture shows learning on some electrode configurations but not others"
  code_pattern: |
    # Define input/output electrode regions
    stim = configure_stimulation(
        protocol='patterned',
        electrodes='custom',
        input_electrodes=[0, 1, 2, 3],     # one edge of MEA
        output_electrodes=[60, 61, 62, 63], # opposite edge
    )
  tags: [simulation, electrodes, spatial]

- name: "Critical regime detection"
  category: analysis
  description: >
    Monitor avalanche statistics (size and duration distributions) to
    detect whether the network operates near criticality. Power-law
    distributed avalanches with exponent ~1.5 indicate critical dynamics,
    which maximize information processing capacity. Beggs & Plenz (2003).
  applicable_when: "Want to verify network is in optimal dynamical regime; avalanche statistics deviate from power law"
  code_pattern: |
    # Analyze avalanche statistics after simulation
    # Look for power-law exponent ~1.5 for sizes, ~2.0 for durations
    # Branching ratio ~1.0 indicates criticality
  tags: [analysis, criticality, avalanche]
