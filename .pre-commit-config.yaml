repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: .venv/bin/python -m pytest tests/ -m unit -q --no-header
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
